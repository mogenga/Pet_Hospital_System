<h2>色彩主题方案</h2>
<p class="subtitle">宠物医院需要兼顾"医疗专业"和"宠物亲和"两种气质</p>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-body">
      <div style="display: flex; gap: 8px; margin-bottom: 12px;">
        <div style="width: 40px; height: 40px; border-radius: 6px; background: #2563EB;"></div>
        <div style="width: 40px; height: 40px; border-radius: 6px; background: #1E40AF;"></div>
        <div style="width: 40px; height: 40px; border-radius: 6px; background: #DBEAFE;"></div>
        <div style="width: 40px; height: 40px; border-radius: 6px; background: #F59E0B;"></div>
      </div>
      <h3>方案 A：医疗蓝</h3>
      <p>蓝色主调 + 琥珀点缀。经典医疗行业配色，传达信任和清洁感。适合偏严肃的专业医院形象。</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-body">
      <div style="display: flex; gap: 8px; margin-bottom: 12px;">
        <div style="width: 40px; height: 40px; border-radius: 6px; background: #16A34A;"></div>
        <div style="width: 40px; height: 40px; border-radius: 6px; background: #15803D;"></div>
        <div style="width: 40px; height: 40px; border-radius: 6px; background: #DCFCE7;"></div>
        <div style="width: 40px; height: 40px; border-radius: 6px; background: #FB923C;"></div>
      </div>
      <h3>方案 B：自然绿</h3>
      <p>绿色主调 + 橘色点缀。传达自然、生命力、健康感。适合强调宠物关怀的诊所形象。</p>
    </div>
  </div>

  <div class="card" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-body">
      <div style="display: flex; gap: 8px; margin-bottom: 12px;">
        <div style="width: 40px; height: 40px; border-radius: 6px; background: #7C3AED;"></div>
        <div style="width: 40px; height: 40px; border-radius: 6px; background: #5B21B6;"></div>
        <div style="width: 40px; height: 40px; border-radius: 6px; background: #EDE9FE;"></div>
        <div style="width: 40px; height: 40px; border-radius: 6px; background: #F472B6;"></div>
      </div>
      <h3>方案 C：温暖紫</h3>
      <p>紫色主调 + 粉色点缀。现代、温暖、个性化。适合偏高端精品宠物诊所。</p>
    </div>
  </div>
</div>

<div class="section">
  <h3>推荐方案 B（自然绿）</h3>
  <p>宠物医院核心是"生命与健康"，绿色最能传达这一理念。橘色作为处方/结算等关键操作的强调色，视觉醒目且不过于医疗化。</p>
</div>
