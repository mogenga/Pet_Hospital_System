<h2>导航布局方案</h2>
<p class="subtitle">宠物医院管理系统有7个业务模块（客户、就诊、药品、收费、住院、寄养、账号管理）+ 仪表盘，三种角色（管理员/医生/护士）菜单不同</p>

<div class="split">
  <div class="mockup" data-choice="a" onclick="toggleSelect(this)">
    <div class="mockup-header">方案 A：经典侧边栏 + 顶栏</div>
    <div class="mockup-body">
      <div style="display: flex; min-height: 200px; background: #f8fafc;">
        <div style="width: 180px; background: #1e293b; color: #fff; padding: 12px; font-size: 11px;">
          <div style="font-weight: bold; margin-bottom: 12px; font-size: 13px;">🏥 宠物医院</div>
          <div style="opacity: 0.6; margin-bottom: 4px;">📊 仪表盘</div>
          <div style="margin-bottom: 4px;">👤 客户管理</div>
          <div style="margin-bottom: 4px;">🩺 就诊管理</div>
          <div style="margin-bottom: 4px;">💊 药品库存</div>
          <div style="margin-bottom: 4px;">💰 收费管理</div>
          <div style="margin-bottom: 4px;">🏥 住院管理</div>
          <div style="margin-bottom: 4px;">🐾 寄养管理</div>
          <div style="opacity: 0.6; margin-bottom: 4px;">⚙️ 账号管理</div>
        </div>
        <div style="flex: 1; padding: 16px;">
          <div class="placeholder">主内容区</div>
        </div>
      </div>
    </div>
    <div class="card-body" style="padding: 8px;">
      <p style="font-size: 12px; margin: 0;">侧边栏收折，适合模块较多的管理系统</p>
    </div>
  </div>

  <div class="mockup" data-choice="b" onclick="toggleSelect(this)">
    <div class="mockup-header">方案 B：顶栏导航 + 内容区</div>
    <div class="mockup-body">
      <div style="background: #f8fafc;">
        <div style="background: #1e293b; color: #fff; padding: 10px 16px; display: flex; gap: 16px; font-size: 11px; align-items: center;">
          <span style="font-weight: bold; font-size: 13px;">🏥</span>
          <span>仪表盘</span><span>客户</span><span>就诊</span><span>药品</span><span>收费</span><span>住院</span><span>寄养</span><span>账号</span>
        </div>
        <div style="padding: 16px;">
          <div class="placeholder" style="min-height: 180px;">主内容区</div>
        </div>
      </div>
    </div>
    <div class="card-body" style="padding: 8px;">
      <p style="font-size: 12px; margin: 0;">简洁但菜单多时拥挤，适合少量模块</p>
    </div>
  </div>
</div>

<div class="options" data-multiselect>
  <div class="option" data-choice="extra-a" onclick="toggleSelect(this)">
    <div class="content">
      <h3>侧边栏可收折</h3>
      <p>展开时显示图标+文字，收折后仅显示图标</p>
    </div>
  </div>
  <div class="option" data-choice="extra-b" onclick="toggleSelect(this)">
    <div class="content">
      <h3>按角色过滤菜单</h3>
      <p>医生看不到账号管理，护士看不到收费结账</p>
    </div>
  </div>
</div>
