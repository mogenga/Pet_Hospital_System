<h2>仪表盘设计</h2>
<p class="subtitle">三种角色登录后看到不同的首页。卡片式布局，关键数据一目了然</p>

<h3>管理员仪表盘</h3>
<div class="mockup">
  <div class="mockup-body">
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px;">
      <div style="background: #FFF7ED; border-left: 3px solid #F97316; padding: 10px; border-radius: 6px;">
        <div style="font-size: 10px; color: #6B7280; margin-bottom: 2px;">今日挂号</div>
        <div style="font-size: 22px; font-weight: bold; color: #F97316;">12</div>
      </div>
      <div style="background: #F0FDF4; border-left: 3px solid #16A34A; padding: 10px; border-radius: 6px;">
        <div style="font-size: 10px; color: #6B7280; margin-bottom: 2px;">住院中</div>
        <div style="font-size: 22px; font-weight: bold; color: #16A34A;">5</div>
      </div>
      <div style="background: #EFF6FF; border-left: 3px solid #2563EB; padding: 10px; border-radius: 6px;">
        <div style="font-size: 10px; color: #6B7280; margin-bottom: 2px;">当日营收</div>
        <div style="font-size: 22px; font-weight: bold; color: #2563EB;">¥2,480</div>
      </div>
      <div style="background: #FEF2F2; border-left: 3px solid #EF4444; padding: 10px; border-radius: 6px;">
        <div style="font-size: 10px; color: #6B7280; margin-bottom: 2px;">库存预警</div>
        <div style="font-size: 22px; font-weight: bold; color: #EF4444;">3</div>
      </div>
    </div>
    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 10px;">
      <div class="placeholder" style="height: 140px;">今日营收趋势图</div>
      <div class="placeholder" style="height: 140px;">待处理事项</div>
    </div>
  </div>
</div>

<h3 style="margin-top: 24px;">医生仪表盘</h3>
<div class="mockup">
  <div class="mockup-body">
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px;">
      <div style="background: #FEF2F2; border-left: 3px solid #EF4444; padding: 10px; border-radius: 6px;">
        <div style="font-size: 10px; color: #6B7280;">待接诊</div>
        <div style="font-size: 22px; font-weight: bold; color: #EF4444;">3</div>
      </div>
      <div style="background: #FFF7ED; border-left: 3px solid #F97316; padding: 10px; border-radius: 6px;">
        <div style="font-size: 10px; color: #6B7280;">接诊中</div>
        <div style="font-size: 22px; font-weight: bold; color: #F97316;">2</div>
      </div>
      <div style="background: #F0FDF4; border-left: 3px solid #16A34A; padding: 10px; border-radius: 6px;">
        <div style="font-size: 10px; color: #6B7280;">今日完成</div>
        <div style="font-size: 22px; font-weight: bold; color: #16A34A;">8</div>
      </div>
    </div>
    <div class="placeholder" style="height: 100px;">候诊队列 — 按挂号时间排列，点击直接接诊</div>
  </div>
</div>

<h3 style="margin-top: 24px;">护士仪表盘</h3>
<div class="mockup">
  <div class="mockup-body">
    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px;">
      <div style="background: #EFF6FF; border-left: 3px solid #2563EB; padding: 10px; border-radius: 6px;">
        <div style="font-size: 10px; color: #6B7280;">住院宠物</div>
        <div style="font-size: 22px; font-weight: bold; color: #2563EB;">5</div>
      </div>
      <div style="background: #FFF7ED; border-left: 3px solid #F97316; padding: 10px; border-radius: 6px;">
        <div style="font-size: 10px; color: #6B7280;">今日护理任务</div>
        <div style="font-size: 22px; font-weight: bold; color: #F97316;">8</div>
      </div>
    </div>
    <div class="placeholder" style="height: 100px;">护理任务列表 — 按时段排列，勾选完成</div>
  </div>
</div>

<div class="section" style="margin-top: 16px;">
  <p class="subtitle">仪表盘采用卡片+统计数据布局，角色之间完全独立。医生聚焦接诊队列，护士聚焦护理日程，管理员关注全局概览。</p>
</div>
